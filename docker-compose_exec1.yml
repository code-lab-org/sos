name: sos_execution_exec1 # Potential source of interference
services:
  manager:
    container_name: sos_manager_exec1 # Potential source of interference
    image: codelaborg/sos:latest
    command: python3 src/manager/main.py
    env_file: .env
    volumes:
      - ./sos_exec1.yaml:/opt/sos.yaml
      - ~/.aws/credentials:/root/.aws/credentials:ro
      - ./:/opt/
    network_mode: "host" # Potential source of interference
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python3 src/manager/main.py' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  planner:
    container_name: sos_planner_exec1 # Potential source of interference
    image: codelaborg/sos:latest
    command: python3 src/planner/main.py
    env_file: .env
    environment:
      - DOWNLOAD_CHECK_INTERVAL=5
      - DOWNLOAD_MAX_ATTEMPTS=1
      - ENABLE_UPLOADS=true
    volumes:
      - ./sos_exec1.yaml:/opt/sos.yaml
      - ~/.aws/credentials:/root/.aws/credentials:ro
      - ./:/opt/
    network_mode: "host" # Potential source of interference
    restart: "no"
    depends_on:
      manager:
        condition: service_healthy

  appender:
    container_name: sos_appender_exec1 # Potential source of interference
    image: codelaborg/sos:latest
    command: python3 src/appender/main.py
    env_file: .env
    environment:
      - ENABLE_UPLOADS=true
    volumes:
      - ./sos_exec1.yaml:/opt/sos.yaml
      - ~/.aws/credentials:/root/.aws/credentials:ro
      - ./:/opt/
    network_mode: "host"
    restart: "no"
    depends_on:
      manager:
        condition: service_healthy

  simulator:
    container_name: sos_simulator_exec1 # Potential source of interference
    image: codelaborg/sos:latest
    command: python3 src/simulator/main.py
    env_file: .env
    environment:
      - ENABLE_UPLOADS=true
    volumes:
      - ./sos_exec1.yaml:/opt/sos.yaml
      - ~/.aws/credentials:/root/.aws/credentials:ro
      - ./:/opt/
    network_mode: "host" # Potential source of interference
    restart: "no"
    depends_on:
      manager:
        condition: service_healthy